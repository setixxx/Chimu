services:
  postgres:
    container_name: chimu-db
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: "chimu"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "277353"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - chimu:/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"

  seaweedfs-master:
    container_name: chimu-seaweedfs-master
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: "master -ip=seaweedfs-master -ip.bind=0.0.0.0 -mdir=/data"
    ports:
      - "9333:9333"
    volumes:
      - seaweedfs-master-data:/data

  seaweedfs-volume:
    container_name: chimu-seaweedfs-volume
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: >
      volume
      -mserver=seaweedfs-master:9333
      -ip=seaweedfs-volume
      -ip.bind=0.0.0.0
      -port=8080
      -dir=/data
      -max=5
    ports:
      - "8082:8080"
    volumes:
      - seaweedfs-volume-data:/data
    depends_on:
      - seaweedfs-master

  seaweedfs-filer:
    container_name: chimu-seaweedfs-filer
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: >
      filer
      -master=seaweedfs-master:9333
      -ip=seaweedfs-filer
      -ip.bind=0.0.0.0
    ports:
      - "8888:8888"
    depends_on:
      - seaweedfs-master
      - seaweedfs-volume

volumes:
  chimu:
  seaweedfs-master-data:
  seaweedfs-volume-data: