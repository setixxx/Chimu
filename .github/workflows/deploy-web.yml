name: Deploy Chimu Web (Wasm)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'cli/**'
      - '.github/workflows/deploy-web.yml'

jobs:
  build-and-push:
    name: Build Wasm and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Wasm
        working-directory: ./cli
        run: ./gradlew :composeApp:wasmJsBrowserDistribution --no-daemon

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./cli
          file: ./cli/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/chimu-web:latest
            ${{ secrets.DOCKER_USERNAME }}/chimu-web:${{ github.sha }}

  deploy:
    name: Deploy Web to VPS
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Pull and restart Web
        run: |
          cd /opt/chimu
          docker compose pull web
          docker compose up -d --no-deps web
          docker image prune -a -f